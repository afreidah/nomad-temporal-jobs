# -------------------------------------------------------------------------------
# Release Workflow - GitHub Actions
#
# Author: Alex Freidah
#
# Triggers on version tag pushes (v*). Runs preflight checks (lint + test),
# creates a GitHub Release, and opens a PR to update CHANGELOG.md via
# git-cliff.
# -------------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

  release:
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --version

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          args: -o CHANGELOG.md

      - name: Open CHANGELOG PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="changelog/${GITHUB_REF_NAME}"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changelog changes" && exit 0
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}" \
            --body "Auto-generated changelog update from release ${GITHUB_REF_NAME}.")
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
