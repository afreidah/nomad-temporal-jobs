# -------------------------------------------------------------------------------
# Release Workflow - GitHub Actions
#
# Author: Alex Freidah
#
# Triggers on version tag pushes (v*). Runs preflight checks (lint + test),
# creates a GitHub Release, and opens a PR to update CHANGELOG.md via
# git-cliff.
# -------------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

  release:
    runs-on: ubuntu-latest
    needs: [preflight]
    # Only this job mutates the repo: GoReleaser cuts the GitHub Release
    # (contents) and the changelog step opens a PR (pull-requests).
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          args: --version

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          args: -o CHANGELOG.md

      - name: Open CHANGELOG PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="changelog/${GITHUB_REF_NAME}"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changelog changes" && exit 0
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}" \
            --body "Auto-generated changelog update from release ${GITHUB_REF_NAME}.")
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
