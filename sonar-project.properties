# -------------------------------------------------------------------------------
# SonarCloud Project Configuration
#
# Author: Alex Freidah
#
# Used by the CI sonar-scan job. Declares the project key/org, the Go coverage
# report path, and the directories excluded from analysis or from the coverage
# metric (process entry points and telemetry wiring that aren't unit-testable).
# -------------------------------------------------------------------------------

sonar.projectKey=afreidah_nomad-temporal-jobs
sonar.organization=afreidah

# Coverage produced by `go test -coverprofile=coverage.out` in the test job.
sonar.go.coverage.reportPaths=coverage.out

sonar.sources=.
sonar.exclusions=**/*_test.go

# Not counted toward the coverage metric -- process entry points, telemetry
# wiring, and the raw external-I/O transport clients (Docker-over-SSH, Consul,
# Postgres, worker bootstrap). These have no isolatable logic to unit-test;
# they're the integration tier (httptest/sqlmock/real backend), not unit
# coverage. The logic that uses them is covered via fakes.
sonar.coverage.exclusions=**/worker/**,shared/telemetry.go,shared/metrics.go,shared/runtime.go,shared/client/ssh/docker.go,shared/client/ssh/ssh.go,shared/client/consul/consul.go,shared/client/postgres/postgres.go,shared/client/git/github.go,shared/client/s3store/s3store.go,certacquirer/activities/acme.go

# Worker mains are thin bootstrap glue (the RunWorker scaffold + dependency
# wiring); they're similar by design, so they're excluded from duplication
# detection -- the same reason they're excluded from coverage above.
sonar.cpd.exclusions=**/worker/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.sourceEncoding=UTF-8
